    <main class="section">
        <h1 class="section-title">Корзина</h1>
        <div id="cartItemsContainer"></div>
        <p style="text-align:right;font-weight:700;font-size:1.3rem;">Итого: <span id="cartTotal">0 ₽</span></p>

        <h3 style="margin-top:40px;">Оформление заказа</h3>
        <form id="orderForm">
            <div class="form-group"><label for="name">Имя *</label><input type="text" id="name" required></div>
            <div class="form-group"><label for="phone">Телефон *</label><input type="tel" id="phone" required></div>
            <div class="form-group"><label for="address">Адрес доставки *</label><input type="text" id="address" required></div>
            <div class="form-group"><label for="comment">Комментарий</label><textarea id="comment" rows="3"></textarea></div>

            <div class="promo-section" style="margin:20px 0; padding:12px; background:#fdf7f0; border-radius:var(--radius-sm);">
                <label for="promoCode" style="font-weight:600;">Промокод</label>
                <div style="display:flex; gap:10px; margin-top:6px;">
                    <input type="text" id="promoCode" placeholder="Введите код" style="flex:1;">
                    <button type="button" id="applyPromoBtn" class="btn-outline">Применить</button>
                </div>
                <p id="promoMessage" style="margin:6px 0 0; font-size:0.85rem;"></p>
                <p style="font-size:0.8rem; color:#888;">У вас есть промокод? Введите его и получите скидку!</p>
            </div>

            <button type="submit" class="btn-submit">Оформить заказ</button>
        </form>
    </main>
